<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <h1 class="brand">StaffPortal</h1>
            <button id="add-emp-btn" class="btn btn-primary">+ Add Employee</button>
        </div>
    </header>

    <main class="main-content">
        <div class="table-card">
            <table id="employee-table">
                <thead>
                    <tr>
                        <th>Employee No</th>
                        <th>Employee Name</th>
                        <th>Designation</th>
                        <th>Salary</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="employee-table-body">
                    </tbody>
            </table>
            <div id="no-data-msg" class="no-data hidden">No employee records found.</div>
        </div>
    </main>

    <div id="form-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Employee</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            
            <form id="employee-form">
                <div id="form-error" class="error-msg hidden"></div>
                
                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" id="emp-name" required placeholder="e.g., Jane Doe">
                </div>

                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" id="emp-designation" required placeholder="e.g., Software Engineer">
                </div>

                <div class="form-group">
                    <label>Salary ($)</label>
                    <input type="number" id="emp-salary" step="0.01" min="0" required placeholder="0.00">
                </div>

                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
